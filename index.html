<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css, javaScript">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <link rel="stylesheet" href="src/css/style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

  <main class="container">

    <header class="header">

      <article class="header_logo">

        <img src="src/images/logo.svg" alt="Huddle" id="logo">

      </article>

    </header>

    <section class="content">

      <section class="content_primary">

        <img src="src/images/illustration-mockups.svg" alt="Illustration Mockups" class="mockups_img">

      </section>

      <section class="content_secundary">

        <h1 class="title">Build The Community Your Fans Will Love</h1>

        <p>
          Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
          Create connections with your users as you engage in genuine discussion.
        </p>

        <a href="" class="button">Register</a>
        
      </section>

    </section>

    <footer class="footer">

      <nav class="footer_nav">

        <ul class="footer_list">

          <li>

            <a href="#" class="footer_item"><i class="fa-brands fa-facebook-f"></i></a>

          </li>
          <li>

            <a href="#" class="footer_item"><i class="fa-brands fa-twitter"></i></a>

          </li>
          <li>

            <a href="#" class="footer_item"><i class="fa-brands fa-instagram"></i></a>

          </li>

        </ul>

      </nav>

    </footer>

  </main>

</body>
</html>
